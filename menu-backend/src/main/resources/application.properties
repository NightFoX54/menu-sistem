spring.application.name=menu-backend
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/kafe}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:179492}

# Flyway otomatik açık, ama açıkça yazmak iyi alışkanlık
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Virgülle ayrılmış origin listesi — üretimde CORS_ALLOWED_ORIGINS env değişkeni ile override et
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

